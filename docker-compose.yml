services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bigdata_backend
    environment:
      - MOCK_GCS_BUCKET_PATH=/data/mock_gcs_bucket
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./mock_gcs_bucket:/data/mock_gcs_bucket:ro
    command: sh -c "pip install --no-cache-dir -r /app/requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bigdata_frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["sh", "-c", "npm install --no-audit --no-fund && npm run dev"]
    depends_on:
      - backend
