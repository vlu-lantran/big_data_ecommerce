name: Build and Push to GHCR

on:
  push:
    branches:
      - main

# CRITICAL: You must explicitly grant GitHub Actions permission to write packages
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # This is built-in! No setup required.

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          # Notice the URL change: ghcr.io/your-username/image-name
          tags: ghcr.io/${{ github.repository_owner }}/bigdata-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bigdata-frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.PRODUCTION_API_URL }}